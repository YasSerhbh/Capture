<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Badge (zinc-950) with zinc-800 border -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="#09090b" stroke="#27272a" stroke-width="24" />
  
  <!-- Subtle Grid Pattern (matching the app's background) -->
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.03" />
    </pattern>
  </defs>
  <rect x="44" y="44" width="424" height="424" rx="90" fill="url(#grid)" />
  
  <!-- "C" Letter in Outfit Font -->
  <text 
    x="50%" 
    y="54%" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    fill="#ffffff" 
    font-family="Outfit, system-ui, sans-serif" 
    font-weight="900" 
    font-size="340px"
  >
    C
  </text>
</svg>
